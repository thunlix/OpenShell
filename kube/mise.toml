# Kubernetes tasks for navigator
# Uses k3d for local Kubernetes development

[tasks.start]
description = "Start/create k3d cluster with registry"
dir = "{{config_root}}/.."
run = """
#!/usr/bin/env bash
set -euo pipefail

CLUSTER_NAME="navigator"
REGISTRY_NAME="registry.localhost"
REGISTRY_PORT="5000"

# Check if cluster exists
if k3d cluster list | grep -q "^${CLUSTER_NAME}"; then
    echo "Cluster '${CLUSTER_NAME}' exists, starting..."
    k3d cluster start "${CLUSTER_NAME}"

    if ! docker exec "k3d-${CLUSTER_NAME}-server-0" sh -c "grep -q ${REGISTRY_NAME} /etc/rancher/k3s/registries.yaml" >/dev/null 2>&1; then
        echo "Registry '${REGISTRY_NAME}' not configured on cluster; recreating cluster..."
        k3d cluster delete "${CLUSTER_NAME}"
        if docker ps -a --format '{{"{{"}}.Names{{"}}"}}' | grep -q "^k3d-${REGISTRY_NAME}$"; then
            k3d registry delete "${REGISTRY_NAME}"
        fi
        k3d cluster create "${CLUSTER_NAME}" \
            --registry-create "${REGISTRY_NAME}:0.0.0.0:${REGISTRY_PORT}" \
            --port "8080:30051@loadbalancer" \
            --wait
    fi
else
    echo "Creating cluster '${CLUSTER_NAME}' with registry..."
    k3d cluster create "${CLUSTER_NAME}" \
        --registry-create "${REGISTRY_NAME}:0.0.0.0:${REGISTRY_PORT}" \
        --port "8080:30051@loadbalancer" \
        --wait
fi

# Update kubeconfig
k3d kubeconfig get "${CLUSTER_NAME}" > kubeconfig
echo "Cluster ready. KUBECONFIG set to $(pwd)/kubeconfig"

# Install Gateway API + Envoy Gateway CRDs (standard channel)
helm template eg oci://docker.io/envoyproxy/gateway-crds-helm \
  --version v1.5.8 \
  --set crds.gatewayAPI.enabled=true \
  --set crds.gatewayAPI.channel=standard \
  --set crds.envoyGateway.enabled=true \
  | kubectl apply --server-side -f -

# Install Envoy Gateway controller
helm upgrade -i eg oci://docker.io/envoyproxy/gateway-helm \
  --version v1.5.8 \
  -n envoy-gateway-system \
  --create-namespace \
  --skip-crds

kubectl wait --timeout=5m -n envoy-gateway-system deployment/envoy-gateway --for=condition=Available
"""

[tasks.stop]
description = "Stop k3d cluster (preserves state)"
run = """
#!/usr/bin/env bash
set -euo pipefail

CLUSTER_NAME="navigator"

if k3d cluster list | grep -q "^${CLUSTER_NAME}"; then
    k3d cluster stop "${CLUSTER_NAME}"
    echo "Cluster '${CLUSTER_NAME}' stopped"
else
    echo "Cluster '${CLUSTER_NAME}' does not exist"
fi
"""

[tasks.destroy]
description = "Delete k3d cluster completely"
dir = "{{config_root}}/.."
run = """
#!/usr/bin/env bash
set -euo pipefail

CLUSTER_NAME="navigator"
REGISTRY_NAME="registry.localhost"

if k3d cluster list | grep -q "^${CLUSTER_NAME}"; then
    k3d cluster delete "${CLUSTER_NAME}"
    echo "Cluster '${CLUSTER_NAME}' deleted"
else
    echo "Cluster '${CLUSTER_NAME}' does not exist"
fi

# Clean up registry if it exists
if k3d registry list | grep -q "${REGISTRY_NAME}"; then
    k3d registry delete "${REGISTRY_NAME}"
    echo "Registry '${REGISTRY_NAME}' deleted"
fi

# Clean up kubeconfig
rm -f kubeconfig
"""

[tasks.deploy]
description = "Build and deploy via skaffold"
dir = "{{config_root}}/.."
depends = ["start"]
run = "skaffold run --default-repo=registry.localhost:5000"

[tasks.deploy-svc]
description = "Build images and restart deployments (no helm/config changes)"
dir = "{{config_root}}/.."
run = """
#!/usr/bin/env bash
set -euo pipefail

DEFAULT_REPO="registry.localhost:5000"

# Build and push server image via skaffold (build only, no deploy)
echo "Building server image..."
skaffold build --default-repo="${DEFAULT_REPO}" --file-output=/tmp/skaffold-build.json

# Build and push factory image
echo "Building factory image..."
DOCKER_BUILDKIT=1 docker build -f docker/Dockerfile.factory -t navigator-factory --build-arg RUST_BUILD_PROFILE=debug .
docker tag navigator-factory "${DEFAULT_REPO}/navigator-factory:latest"
docker push "${DEFAULT_REPO}/navigator-factory:latest"

# Restart deployments
echo "Restarting deployments..."
kubectl rollout restart deployment/navigator -n navigator
kubectl rollout status deployment/navigator -n navigator --timeout=120s

echo "Services restarted successfully"
"""

[tasks.dev]
description = "Dev mode with hot reload via skaffold"
dir = "{{config_root}}/.."
depends = ["start"]
run = "skaffold dev --default-repo=registry.localhost:5000"
