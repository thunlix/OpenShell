stages:
  - build-ci-image
  - lint
  - test
  - publish

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH

variables:
  CARGO_TERM_COLOR: "always"
  CARGO_INCREMENTAL: "0"
  CI_IMAGE: $CI_REGISTRY_IMAGE/ci:latest
  CI_IMAGE_CACHE: $CI_REGISTRY_IMAGE/ci:buildcache
  MISE_AUTO_INSTALL: "0"
  MISE_TASK_RUN_AUTO_INSTALL: "0"
  MISE_NOT_FOUND_AUTO_INSTALL: "0"

default:
  image: $CI_IMAGE
  tags:
    - agent-dev-kit-build

cache:
  - key:
      files:
        - uv.lock
    paths:
      - .venv/
      - .cache/uv/
  - key:
      files:
        - Cargo.lock
      prefix: "sccache-$CI_RUNNER_EXECUTABLE_ARCH"
    paths:
      - .cache/sccache/
  - key:
      files:
        - Cargo.lock
        - build/rust.toml
      prefix: "target-$CI_RUNNER_EXECUTABLE_ARCH"
    paths:
      - target/
  - key: "buildkit-$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/buildkit/

.rust_job_rules:
  rules:
    - changes:
        - Cargo.toml
        - Cargo.lock
        - crates/**/*
        - proto/**/*
        - build/rust.toml
        - build/test.toml
        - build/ci.toml
        - mise.toml
        - .gitlab-ci.yml
    - when: never

.python_job_rules:
  rules:
    - changes:
        - pyproject.toml
        - uv.lock
        - python/**/*
        - scripts/**/*
        - proto/**/*
        - build/python.toml
        - build/test.toml
        - build/ci.toml
        - mise.toml
        - .gitlab-ci.yml
    - when: never

.e2e_job_rules:
  rules:
    - changes:
        - e2e/**/*
        - deploy/docker/**/*
        - deploy/helm/**/*
        - deploy/kube/**/*
        - build/cluster.toml
        - build/docker.toml
        - build/test.toml
        - build/scripts/**/*
        - crates/**/*
        - proto/**/*
        - mise.toml
        - .gitlab-ci.yml
    - when: never

# =============================================================================
# CI Image Build (runs only when dependencies change)
# =============================================================================
build_ci_image:
  stage: build-ci-image
  image: docker:24
  services:
    - docker:24-dind
  cache: []
  tags:
    - agent-dev-kit-build
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_TLS_VERIFY: ""
    DOCKER_CERT_PATH: ""
    DOCKER_BUILDKIT: "1"
  before_script: []  # Override default before_script (docker:24 doesn't have uv)
  rules:
    - changes:
        - deploy/docker/Dockerfile.ci
        - mise.toml
        - build/**/*
        - .gitlab-ci.yml
    - when: never
  script:
    - until docker info >/dev/null 2>&1; do sleep 1; done
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker buildx create --use --name ci-builder || docker buildx use ci-builder
    - |
      docker buildx build \
        --pull \
        --cache-from type=registry,ref=$CI_IMAGE \
        --cache-to type=registry,ref=$CI_IMAGE_CACHE,mode=max \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        -f deploy/docker/Dockerfile.ci \
        -t $CI_IMAGE \
        --push \
        .

# =============================================================================
# Lint Jobs
# =============================================================================
fmt_check:
  extends: .rust_job_rules
  stage: lint
  script:
    - mise run fmt:check

clippy:
  extends: .rust_job_rules
  stage: lint
  script:
    - mise run clippy

python_lint:
  extends: .python_job_rules
  stage: lint
  before_script:
    - uv sync --frozen
  script:
    - mise run python:lint

# =============================================================================
# Test Jobs
# =============================================================================
rust_test:
  extends: .rust_job_rules
  stage: test
  script:
    - mise run test:rust

python_test:
  extends: .python_job_rules
  stage: test
  before_script:
    - uv sync --frozen
  script:
    - mise run test:python

python_e2e_sandbox_test:
  extends: .e2e_job_rules
  stage: test
  services:
    - docker:24-dind
  tags:
    - agent-dev-kit-build
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_TLS_VERIFY: ""
    DOCKER_CERT_PATH: ""
    IMAGE_TAG: "$CI_COMMIT_SHA"
    IMAGE_REPO_BASE: "$CI_REGISTRY_IMAGE"
    NAVIGATOR_REGISTRY_INSECURE: "false"
  before_script:
    - uv sync --frozen
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - socat UNIX-LISTEN:/var/run/docker.sock,fork,reuseaddr TCP:docker:2375 &
    - sleep 1
    - mise run cluster
    - mise run test:e2e:sandbox

# =============================================================================
# Publish Jobs (main branch only)
# =============================================================================
publish_ecr_images:
  stage: publish
  services:
    - docker:24-dind
  tags:
    - agent-dev-kit-build
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_TLS_VERIFY: ""
    DOCKER_CERT_PATH: ""
    DOCKER_BUILDKIT: "1"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - uv sync --frozen
    # Authenticate to ECR
    - aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin 012345678901.dkr.ecr.us-west-2.amazonaws.com
  script:
    - mise run docker:publish:cluster:multiarch
