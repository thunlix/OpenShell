apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "navigator.fullname" . }}
  labels:
    {{- include "navigator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "navigator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "navigator.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "navigator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: init-db
          image: {{ .Values.server.initImage | quote }}
          command:
            - sh
            - -c
            - "mkdir -p /var/navigator && chmod 0770 /var/navigator"
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: navigator-data
              mountPath: /var/navigator
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --port
            - {{ .Values.service.port | quote }}
            - --log-level
            - {{ .Values.server.logLevel }}
            - --db-url
            - {{ .Values.server.dbUrl | quote }}
          env:
            - name: NAVIGATOR_SANDBOX_NAMESPACE
              value: {{ .Values.server.sandboxNamespace | quote }}
            - name: NAVIGATOR_SANDBOX_IMAGE
              value: {{ .Values.server.sandboxImage | quote }}
            - name: NAVIGATOR_GRPC_ENDPOINT
              value: {{ .Values.server.grpcEndpoint | quote }}
          volumeMounts:
            - name: navigator-data
              mountPath: /var/navigator
          ports:
            - name: grpc
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: navigator-data
          emptyDir: {}
